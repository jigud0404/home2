                { href: "/blog/en/introducing-asrec/", icon: "fa-door-open", category: "Studio", date: "Apr 02, 2026", title: "Introducing Asrec Studio! A Virtual Tour of Asrec", desc: "Asrec Studio is officially open! From the Control Room to the Lounge — take a look inside the spaces where game characters come to life." },
                { href: "/blog/en/game-dubbing-adaptation/", icon: "fa-pen-nib", category: "Script Adaptation", date: "Apr 01, 2025", title: "Beyond Translation: Adding 'Flavor' to Your Script for Iconic Voiceover", desc: "Before hitting record, there's one crucial step — script adaptation. Discover why transforming written lines into natural spoken dialogue is the secret to iconic voiceover." },

                { href: "/blog/en/game-dubbing-process/", icon: "fa-microphone-lines", category: "Game Dubbing", date: "Mar 01, 2025", title: "How is Game Voiceover Made? A Complete Production Guide", desc: "A comprehensive guide to the entire game voiceover production pipeline — from project intake and casting to recording, post-production, and final delivery." },
            ];
            const ITEMS_PER_PAGE = 3;
            const totalPages = Math.ceil(allPosts.length / ITEMS_PER_PAGE);

                                <span className="text-xs text-gray-500 font-bold">{page + 1} / {totalPages}</span>
                                <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page === totalPages - 1} className={"w-9 h-9 rounded-full border flex items-center justify-center transition-all " + (page === totalPages - 1 ? 'border-white/10 text-gray-600 cursor-not-allowed' : 'border-cyan-500/50 text-cyan-400 hover:bg-cyan-500/10')}><i className="fas fa-chevron-right text-xs"></i></button>
                            </div>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-5">

                                <a key={i} href={post.href} className="group bg-slate-900/50 border border-white/5 rounded-2xl p-7 hover:border-cyan-500/30 transition-all duration-300 hover:-translate-y-1 fade-in-up flex flex-col gap-4" style={{animationDelay: (i * 0.1) + "s"}}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-9 h-9 rounded-xl bg-cyan-950 border border-cyan-900 flex items-center justify-center shrink-0"><i className={"fas " + post.icon + " text-sm text-cyan-400"}></i></div>
                                        <span className="text-xs font-bold text-cyan-400 bg-cyan-500/10 px-3 py-1 rounded-full">{post.category}</span>
                                        <span className="text-xs text-gray-500 ml-auto">{post.date}</span>
                                    </div>
                                    <div className="flex-1">

                                        <p className="text-gray-400 text-sm leading-relaxed" style={{display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden'}}>{post.desc}</p>

    <!-- Auto-scroll to hash section when coming from blog pages -->
    <script>
        (function() {
            const hash = window.location.hash;
            if (!hash) return;
            const observer = new MutationObserver(function() {
                const el = document.querySelector(hash);
                if (el) { observer.disconnect(); setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100); }
            });
            observer.observe(document.getElementById('root'), { childList: true, subtree: true });
            setTimeout(function() { observer.disconnect(); }, 10000);
        })();
    </script>
